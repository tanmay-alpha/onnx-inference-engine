[alembic]
script_location = server/alembic
sqlalchemy.url = postgresql+asyncpg://crucible:postgres@localhost:5432/crucible

[post_write_hooks]
[alembic.hooks.post_write.console]

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname = ''

[logger_sqlalchemy]
level = WARN

[logger_alembic]
level = INFO
