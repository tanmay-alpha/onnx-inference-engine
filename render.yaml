services:
  # ── Frontend: Vite/TanStack Start static site ────────────────────────────
  - type: web
    name: crucible-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/.output/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

  # ── Backend: FastAPI inference server ────────────────────────────────────
  # Disabled on free tier (requires Docker build which is slow).
  # Uncomment to deploy the Python server separately.
