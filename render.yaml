services:
  # ── Frontend: Vite/TanStack Start static site ────────────────────────────
  - type: web
    name: crucible-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/.output/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        fromService:
          type: web
          name: crucible-api
          property: url

  # ── Backend: FastAPI inference server ──────────────────────────────────────
  - type: web
    name: crucible-api
    runtime: docker
    dockerfilePath: server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: CRUCIBLE_SECRET_KEY
        generateValue: true
      - key: CRUCIBLE_API_KEY
        sync: false
      - key: CRUCIBLE_CORS_ORIGINS
        sync: false
      - key: CRUCIBLE_MODEL_DIR
        value: /tmp/models
      - key: INFERENCE_TIMEOUT_SEC
        value: "60"
      - key: MAX_UPLOAD_BYTES
        value: "209715200"
      - key: CRUCIBLE_LOG_LEVEL
        value: INFO
      - key: CRUCIBLE_LOG_FORMAT
        value: json
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: UTC
